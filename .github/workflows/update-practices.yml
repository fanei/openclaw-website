name: Update Practices Data

on:
  schedule:
    # 每天 UTC 21:00（北京时间 05:00）
    - cron: '0 21 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest

    # 设置权限
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run collection script
        run: npm run collect:practices
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show diff
        run: |
          echo "=== Checking for changes ==="
          if git diff --quiet public/practices/data.json; then
            echo "No changes detected"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected!"
            git diff public/practices/data.json
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
        id: verify

      - name: Commit and push changes
        if: steps.verify.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/practices/data.json
          git commit -m "Auto: update practices data [skip ci]"
          git push

      - name: Notify Vercel
        if: steps.verify.outputs.changed == 'true'
        run: |
          echo "✅ Changes pushed to GitHub"
          echo "🔄 Vercel will auto-deploy on commit push"
