name: Update Practices Data

on:
  schedule:
    # 每天 UTC 21:00（北京时间 05:00）
    - cron: '0 21 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run collection script
        run: npm run collect:practices
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Check for changes
        id: verify
        run: |
          if git diff --quiet public/practices/data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.verify.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Auto: update practices data [skip ci]"
          git push

      - name: Trigger Vercel deployment
        if: steps.verify.outputs.changed == 'true'
        run: |
          # Vercel 会自动检测 GitHub commit 并部署
          # 如果你配置了 Vercel GitHub 集成，这步会自动触发
          echo "Vercel will auto-deploy on commit push"
